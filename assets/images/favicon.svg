<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <clipPath id="circle-clip">
            <circle cx="50" cy="50" r="50" />
        </clipPath>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="50" fill="#ede9fe" />
    
    <!-- Everything inside here gets perfectly cropped to the circle! -->
    <g clip-path="url(#circle-clip)">
        <!-- Mascot Head/Body -->
        <ellipse cx="50" cy="80" rx="42" ry="48" fill="#6C63FF" />
        
        <!-- Graduation Cap (Scaled & Centered) -->
        <g transform="translate(14, 5) scale(0.6)">
            <rect x="28" y="24" width="64" height="10" rx="3" fill="#1e1b4b" />
            <polygon points="60,10 90,26 60,30 30,26" fill="#312e81" />
            <line x1="90" y1="26" x2="96" y2="46" stroke="#312e81" stroke-width="2" />
            <circle cx="96" cy="48" r="4" fill="#a78bfa" />
        </g>

        <!-- Eyes -->
        <circle cx="32" cy="54" r="13" fill="white" />
        <circle cx="68" cy="54" r="13" fill="white" />
        
        <!-- Pupils -->
        <circle cx="35" cy="55" r="7" fill="#1e1b4b" />
        <circle cx="71" cy="55" r="7" fill="#1e1b4b" />
        
        <!-- Eye Shines -->
        <circle cx="37" cy="52" r="2.5" fill="white" />
        <circle cx="73" cy="52" r="2.5" fill="white" />
        
        <!-- Beak -->
        <polygon points="50,62 42,74 58,74" fill="#f59e0b" />
    </g>
</svg>
